name: Build & verify CSS
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node src/build.mjs
      - name: Fail if generated files are stale
        run: |
          if [ -n "$(git status --porcelain TangerineUI*.css mastodon/app/javascript/styles/)" ]; then
            echo "Generated CSS is out of date. Run 'node src/build.mjs' and commit the result."
            git --no-pager diff
            exit 1
          fi
